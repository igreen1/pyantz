[project]
name = "pyantz"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "igreen1", email = "iangreen2.00@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "polars>=1.36.1",
    "pydantic>=2.11.7",
    "sqlalchemy>=2.0.42",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff.lint]
select = ["ALL"]

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pylint>=4.0.4",
    "pytest>=9.0.2",
    "ruff>=0.14.10",
    "ty>=0.0.4",
]
